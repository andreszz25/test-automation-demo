name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select the Test Environment
        required: true
        default: 'staging'
        type: choice
        options:
          - local
          - staging
          - production
      user_role:
        description: Select the User Role
        required: true
        default: 'member'
        type: choice
        options:  
          - member
          - admin
  

  pull_request:
    branches: [ main ]

  
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    env:
      DOJO_USER_MEMBER_EMAIL: ${{ secrets.DOJO_USER_MEMBER_EMAIL }}
      DOJO_USER_MEMBER_PASSWORD: ${{ secrets.DOJO_USER_MEMBER_PASSWORD }}
      TEST_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      USER_ROLE: ${{ github.event.inputs.user_role || 'member' }} 
    steps:
    - uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps
    - name: Run Playwright tests
      env:
        DOJO_USER_MEMBER_EMAIL: ${{ secrets.DOJO_USER_MEMBER_EMAIL }}
        DOJO_USER_MEMBER_PASSWORD: ${{ secrets.DOJO_USER_MEMBER_PASSWORD }}
      run: bunx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
